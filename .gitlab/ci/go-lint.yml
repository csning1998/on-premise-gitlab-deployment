---
go-lint:
  stage: lint
  image: golangci/golangci-lint:v2.12.2-alpine
  needs:
    - job: go-build
      optional: true
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - "tools/**/*.go"
        - "tools/**/go.mod"
        - "tools/**/go.sum"
  script:
    - cd tools/ci
    - golangci-lint run -c ../../.gitlab/golangci.yml ./...
