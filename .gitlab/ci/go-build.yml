---
go-build:
  stage: lint
  image: golang:1.26-alpine
  needs: []
  interruptible: true
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      changes:
        - "tools/**/*.go"
        - "tools/**/go.mod"
        - "tools/**/go.sum"
  script:
    - cd tools/ci
    - go build ./...
