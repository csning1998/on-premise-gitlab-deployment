---
# 1. Dynamic Grouping: Map node_role to Ansible groups
- name: "Play [Setup]: Dynamic Grouping based on node_role"
  hosts: all
  gather_facts: false
  tasks:
    - name: "Create dynamic groups from node_role variable"
      ansible.builtin.group_by:
        key: "{{ node_role }}"

# Phase 1: Central Load Balancer (Refactored)
- name: "Play [LB]: Configure Central Load Balancer"
  hosts: "{{ 'lb' if 'lb' in groups else [] }}"
  become: true
  roles:
    - 10-infra-load-balancer

# Phase 2: Vault (Refactored)
- name: "Play [Vault]: Provision Vault Cluster"
  hosts: "{{ 'vault' if 'vault' in groups else [] }}"
  become: true
  roles:
    - 15-infra-vault
