---
# 1. Dynamic Grouping: Map node_role to Ansible groups
- name: "Play [Setup]: Dynamic Grouping based on node_role"
  hosts: all
  gather_facts: false
  tasks:
    - name: "Create dynamic groups from node_role variable"
      ansible.builtin.group_by:
        key: "{{ node_role | replace('-', '_') }}"

# (HA) ETCD
- name: "Play [ETCD]: Configure etcd Cluster"
  hosts: >-
    {{ (groups['etcd'] | default([]))
       + (groups['praefect_patroni'] | default([])) }}
  become: true
  roles:
    - 09-base-etcd
    - 30-infra-etcd

# Patroni
- name: "Play [Postgres]: Configure Patroni and PostgreSQL Cluster"
  hosts: >-
    {{ (groups['postgres'] | default([]))
       + (groups['praefect_patroni'] | default([])) }}
  become: true
  roles:
    - 30-infra-postgres

# Redis Sentinel
- name: "Play [Redis]: Configure Redis High Availability Cluster"
  hosts: "{{ 'redis' if 'redis' in groups else [] }}"
  become: true
  roles:
    - 30-infra-redis

# MinIO Distributed
- name: "Play [MinIO]: Configure MinIO High Availability Cluster"
  hosts: "{{ 'minio' if 'minio' in groups else [] }}"
  become: true
  roles:
    - 30-infra-minio

# Gitaly and Praefect
- name: "Play [Gitaly/Praefect]: Configure Gitaly / Praefect High Availability Cluster"
  hosts: "{{ (groups['gitaly'] | default([])) + (groups['praefect'] | default([])) }}"
  become: true
  roles:
    - 30-infra-gitaly-praefect
