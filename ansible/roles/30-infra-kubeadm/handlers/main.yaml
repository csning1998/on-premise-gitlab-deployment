---
# Infrastructure Handlers
- name: Update CA Certificates
  ansible.builtin.command: update-ca-certificates
  changed_when: false

- name: Restart journald
  ansible.builtin.systemd:
    name: systemd-journald
    state: restarted

- name: Restart containerd service
  ansible.builtin.systemd:
    name: containerd
    state: restarted

# HA & Load Balancing Handlers (Obsolete - Migrated to CLB)
- name: Restart keepalived
  ansible.builtin.debug:
    msg: "Keepalived restart skipped (service purged from Master)"

- name: Restart haproxy
  ansible.builtin.debug:
    msg: "HAProxy restart skipped (service purged from Master)"

- name: Restart haproxy on primary master
  ansible.builtin.debug:
    msg: "HAProxy restart on primary skipped (service purged from Master)"
  listen: "Restart haproxy on primary master"

- name: Restart kubelet
  ansible.builtin.systemd:
    name: kubelet
    state: restarted
