---
- name: "Block B1: Install and Configure HA Services"
  block:
    - name: "B1a. Enable non-local binding (Required for VIP)"
      ansible.posix.sysctl:
        name: "net.ipv4.ip_nonlocal_bind"
        value: "1"
        state: present
        reload: true

    - name: "B1b. Install HAProxy and Keepalived"
      ansible.builtin.apt:
        name:
          - keepalived
          - haproxy
          - rsyslog
        state: present
        update_cache: true

    - name: "B1c. Create keepalived_script user"
      ansible.builtin.user:
        name: "keepalived_script"
        system: true
        shell: "/usr/sbin/nologin"
        state: present
        create_home: false

- name: "Block B2: Configure Services"
  block:
    - name: "B2a. Configure Keepalived"
      ansible.builtin.template:
        src: keepalived.conf.j2
        dest: /etc/keepalived/keepalived.conf
        mode: "0644"
        validate: keepalived --config-test %s
      notify: Restart keepalived

    - name: "B2b. Configure HAProxy"
      ansible.builtin.template:
        src: haproxy.cfg.j2
        dest: /etc/haproxy/haproxy.cfg
        mode: "0640"
        validate: haproxy -c -f %s
      notify: Restart haproxy

    - name: "B2c. Configure Rsyslog for Keepalived"
      ansible.builtin.lineinfile:
        path: /etc/rsyslog.conf
        line: "local0.* /var/log/keepalived.log"
        create: true
        mode: "0644"
      notify: Restart rsyslog
      changed_when: false

    - name: "B2d. Ensure services are started and enabled"
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
        enabled: true
        daemon_reload: true
      loop:
        - keepalived
        - haproxy
