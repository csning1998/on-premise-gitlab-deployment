---
- name: "Block B1: Purge Legacy HA Services"
  block:
    - name: "B1a. Ensure Legacy Services are Stopped and Disabled"
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: stopped
        enabled: false
      loop:
        - keepalived
        - haproxy
      register: _purge_services
      failed_when:
        - _purge_services.failed
        - "'Could not find the requested service' not in _purge_services.msg"
        - "'not found' not in _purge_services.msg"

    - name: "B1b. Remove HAProxy and Keepalived packages"
      ansible.builtin.apt:
        name:
          - keepalived
          - haproxy
        state: absent
        purge: true

    - name: "B1c. Clean up stale VIP configurations"
      ansible.builtin.shell: |
        ip addr del {{ kubeadm_ha_vip }}/32 dev enp0s4 || true
      changed_when: false

  rescue:
    - name: "Block B1: Purge Legacy HA Services failed"
      ansible.builtin.fail:
        msg: "{{ ansible_failed_result.msg | default('see task output above') }}"
