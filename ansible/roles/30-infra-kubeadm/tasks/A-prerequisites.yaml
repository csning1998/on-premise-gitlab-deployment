---
- name: "Block A1: Dynamically discover the Host-only network interface for Kubeadm"
  block:
    - name: "A1a. Identify Host-only interface from facts"
      ansible.builtin.set_fact:
        kubeadm_ha_interface: "{{ item }}"
      loop: "{{ ansible_facts.interfaces }}"
      when:
        - item != 'lo'
        - item not in ['vxlan.calico', 'calico', 'flannel.1', 'cni0', 'docker0']
        - not item.startswith('veth')
        - ansible_facts[item]['ipv4'] is defined
        - not (ansible_facts[item]['ipv4']['address'].startswith(kubeadm_nat_subnet_prefix | default('10.0.2')))
      no_log: true

    - name: "A1b. Set kubeadm_advertise_ip fact"
      ansible.builtin.set_fact:
        kubeadm_advertise_ip: "{{ ansible_facts[kubeadm_ha_interface]['ipv4']['address'] }}"
      when: kubeadm_ha_interface is defined

    - name: "A1c. Fail if advertisement IP could not be determined"
      ansible.builtin.fail:
        msg: "Could not dynamically determine the advertisement IP using prefix exclusion."
      when: kubeadm_advertise_ip is not defined

  rescue:
    - name: "Block A1: Dynamically discover the Host-only network interface for Kubeadm failed"
      ansible.builtin.fail:
        msg: "{{ ansible_failed_result.msg | default('see task output above') }}"

- name: "Block A2: Establish Certificate Trust for Containerd & OS"
  become: true
  block:
    - name: "A2a. Ensure ca-certificates package is installed"
      ansible.builtin.apt:
        name: ca-certificates
        state: present
        update_cache: true

    - name: "A2b. Distribute Vault PKI Service CA to OS trust store"
      ansible.builtin.copy:
        content: "{{ vault_ca_cert_b64 | b64decode }}"
        dest: /usr/local/share/ca-certificates/vault-ca.crt
        mode: "0644"
        owner: root
        group: root
      notify: Update CA Certificates

    - name: "A2c. Force update CA certificates"
      ansible.builtin.command: update-ca-certificates
      changed_when: true
      notify: Restart containerd service

  rescue:
    - name: "Block A2: Establish Certificate Trust for Containerd & OS failed"
      ansible.builtin.fail:
        msg: "{{ ansible_failed_result.msg | default('see task output above') }}"

- name: "Block A3: Configure Containerd Registry endpoint"
  become: true
  block:
    - name: "A3a. Pre-calculate Registry Configurations"
      ansible.builtin.set_fact:
        _containerd_registry_configs: "{{ lookup('template', 'containerd_registry_configs.j2') | from_yaml }}"

    - name: "A3c. Ensure Mirror Directories Exist"
      ansible.builtin.file:
        path: "/etc/containerd/certs.d/{{ item.domain }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop: "{{ _containerd_registry_configs }}"

    - name: "A3d. Deploy hosts.toml for Harbor Registry"
      ansible.builtin.template:
        src: hosts.toml.j2
        dest: "/etc/containerd/certs.d/{{ item.domain }}/hosts.toml"
        owner: root
        group: root
        mode: "0644"
      notify: Restart containerd service
      loop: "{{ _containerd_registry_configs }}"

  rescue:
    - name: "Block A3: Configure Containerd Registry endpoint failed"
      ansible.builtin.fail:
        msg: "{{ ansible_failed_result.msg | default('see task output above') }}"
