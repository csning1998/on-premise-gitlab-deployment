---
- name: "Block G1: Upload Kubeconfig to Vault"
  run_once: true
  block:
    - name: "G1a. Read kubeconfig from primary master"
      ansible.builtin.slurp:
        src: "/etc/kubernetes/admin.conf"
      register: remote_kubeconfig
      no_log: true

    - name: "Block G1b: Upload Kubeconfig to Vault KV"
      delegate_to: localhost
      become: false
      block:
        - name: "G1ba. Create temporary CA file for Vault"
          ansible.builtin.tempfile:
            state: file
            suffix: .crt
          register: vault_ca_file

        - name: "G1bb. Write Vault CA to temp file"
          ansible.builtin.copy:
            content: "{{ vault_ca_cert_b64 | b64decode }}"
            dest: "{{ vault_ca_file.path }}"
            mode: "0600"

        - name: "G1bc. Upload Kubeconfig to Vault KV"
          community.hashi_vault.vault_kv2_write:
            url: "{{ vault_endpoint }}"
            path: "{{ vault_kv_namespace }}/infrastructure/kubeconfig/{{ service_name }}"
            engine_mount_point: "secret"
            auth_method: approle
            mount_point: "{{ vault_auth_path }}"
            role_id: "{{ vault_agent_role_id }}"
            secret_id: "{{ vault_agent_secret_id }}"
            validate_certs: true
            ca_cert: "{{ vault_ca_file.path }}"
            data:
              content_b64: "{{ remote_kubeconfig['content'] }}"

      always:
        - name: "G1c. Clean up temporary Vault CA file"
          ansible.builtin.file:
            path: "{{ vault_ca_file.path }}"
            state: absent
          when: vault_ca_file.path is defined

  rescue:
    - name: "Block G1: Upload Kubeconfig to Vault failed"
      ansible.builtin.fail:
        msg: "{{ ansible_failed_result.msg | default('see task output above') }}"
