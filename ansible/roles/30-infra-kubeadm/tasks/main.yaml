---
- name: "Role 81: Configure Network Routing"
  ansible.builtin.include_role:
    name: 81-utils-asymmetric-routing
  vars:
    routing_static_routes: "{{ kubeadm_static_routes }}"
  when: kubeadm_static_routes is defined

- name: "Section A. Setup Kubeadm Prerequisites"
  ansible.builtin.include_tasks: A-prerequisites.yaml

- name: "Role 82: Prepare Vault Agent for Kubernetes Nodes"
  ansible.builtin.include_role:
    name: 82-utils-vault-agent
  vars:
    vault_agent_owner: "root"
    vault_agent_group: "root"
    vault_agent_cert_base_dir: "/etc/kubernetes/certs"
    vault_agent_post_command: "systemctl restart containerd"
    vault_agent_ip_sans: "{{ kubeadm_advertise_ip }},{{ kubeadm_ha_virtual_ip }}"

- name: "Section B. Configure HAProxy (Masters)"
  ansible.builtin.include_tasks: B-haproxy.yaml
  when: inventory_hostname in (groups['master'] | default([]))

- name: "Section C. Initialize Primary Master"
  ansible.builtin.include_tasks: C-kubeadm-init.yaml
  when: inventory_hostname in (groups['master'] | default([]) | intersect(groups['primary'] | default([])))

- name: "Section D. Generate Join Tokens"
  ansible.builtin.include_tasks: D-join-token.yaml
  when: inventory_hostname in (groups['master'] | default([]) | intersect(groups['primary'] | default([])))

- name: "Section E. Join Secondary Masters"
  ansible.builtin.include_tasks: E-join-secondary.yaml
  when: inventory_hostname in (groups['master'] | default([]) | intersect(groups['replica'] | default([])))

- name: "Section F. Join Worker Nodes"
  ansible.builtin.include_tasks: F-join-workers.yaml
  when: inventory_hostname in (groups['worker'] | default([]))

- name: "Section G. Setup Kubeconfig Vault Storage"
  ansible.builtin.include_tasks: G-kubeconfig.yaml
  when: inventory_hostname in (groups['master'] | default([]) | intersect(groups['primary'] | default([])))
