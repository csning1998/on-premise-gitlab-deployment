---
- name: Block C. Install and Configure container runtime
  block:
    - name: "Step 1. Download Docker GPG key"
      ansible.builtin.get_url:
        url: "{{ _kubeadm_base_repo_docker_gpg_url }}"
        dest: "{{ _kubeadm_base_repo_docker_data.gpg_key_temp_path }}"
        mode: "0644"
      retries: 5
      delay: 10

    - name: "Step 2. Dearmor Docker GPG key"
      ansible.builtin.command:
        cmd: "gpg --dearmor -o {{ _kubeadm_base_repo_docker_data.gpg_keyring_path }} {{ _kubeadm_base_repo_docker_data.gpg_key_temp_path }}"
      args:
        creates: "{{ _kubeadm_base_repo_docker_data.gpg_keyring_path }}"
      register: gpg_dearmor_result
      changed_when: gpg_dearmor_result.rc == 0 and 'overwrite' not in gpg_dearmor_result.stderr

    - name: "Step 3. Add Docker apt repository for containerd"
      ansible.builtin.apt_repository:
        repo: "{{ _kubeadm_base_repo_docker_string }}"
        state: present
        filename: "{{ _kubeadm_base_repo_docker_data.filename }}"

    - name: "Step 4. Force apt cache update after adding new repository"
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      changed_when: false

    - name: "Step 5. Install containerd"
      ansible.builtin.apt:
        name: "{{ kubeadm_base.packages.apt.cri }}"
        state: present
      notify: Enable and start containerd service

    - name: "Step 6. Ensure containerd config directory exists"
      ansible.builtin.file:
        path: /etc/containerd
        state: directory
        mode: "0755"

    - name: "Step 7. Deploy containerd configuration template"
      ansible.builtin.template:
        src: C-containerd-config.toml.j2
        dest: "{{ kubeadm_base.config_paths.containerd }}"
        mode: "0644"
      notify: Restart containerd service

    - name: "Step 8. Download crictl archive"
      ansible.builtin.get_url:
        url: "{{ _kubeadm_base_crictl_download_url }}"
        dest: "{{ _kubeadm_base_crictl_temp_path }}"
        mode: "0644"
      retries: 5
      delay: 10

    - name: "Step 9. Unarchive crictl"
      ansible.builtin.unarchive:
        src: "{{ _kubeadm_base_crictl_temp_path }}"
        dest: "{{ _kubeadm_base_crictl_data.dest_path }}"
        remote_src: true
        mode: "0755"
        creates: "{{ _kubeadm_base_crictl_data.dest_path }}/crictl"

    - name: "Step 10. Clean up crictl archive"
      ansible.builtin.file:
        path: "{{ _kubeadm_base_crictl_temp_path }}"
        state: absent

    - name: "Step 11. Create crictl configuration for containerd"
      ansible.builtin.copy:
        dest: /etc/crictl.yaml
        content: |
          runtime-endpoint: unix:///run/containerd/containerd.sock
          image-endpoint: unix:///run/containerd/containerd.sock
          timeout: 10
          debug: false
        mode: "0644"
