---
- name: "Step 1. Resolve Vault auth path for exporter vault-agent"
  ansible.builtin.set_fact:
    _pg_exporter_vault_auth_path: >-
      {{ _postgres_vault_identity.auth_path
        if _postgres_vault_identity is defined
        else vault_auth_path }}

- name: "Step 2. Deploy vault-agent-kv config for postgres-exporter"
  become: true
  ansible.builtin.template:
    src: vault-agent-postgres-exporter.hcl.j2
    dest: /etc/vault.d/vault-agent-postgres-exporter.hcl
    owner: root
    group: root
    mode: "0600"
  register: _pg_exporter_vault_hcl

- name: "Step 3. Deploy vault-agent-kv service for postgres-exporter"
  become: true
  ansible.builtin.template:
    src: vault-agent-postgres-exporter.service.j2
    dest: /etc/systemd/system/vault-agent-postgres-exporter.service
    owner: root
    group: root
    mode: "0644"
  register: _pg_exporter_vault_svc

- name: "Step 4. Enable and start vault-agent-postgres-exporter"
  become: true
  ansible.builtin.systemd:
    name: vault-agent-postgres-exporter
    state: started
    enabled: true
    daemon_reload: "{{ _pg_exporter_vault_svc.changed }}"

- name: "Step 5. Restart vault-agent-postgres-exporter if config changed"
  become: true
  ansible.builtin.systemd:
    name: vault-agent-postgres-exporter
    state: restarted
  when: _pg_exporter_vault_hcl.changed or _pg_exporter_vault_svc.changed

- name: "Step 6. Wait for env file to be rendered"
  become: true
  ansible.builtin.wait_for:
    path: /etc/default/prometheus-postgres-exporter
    timeout: 30

- name: "Step 7. Enable and start prometheus-postgres-exporter"
  become: true
  ansible.builtin.systemd:
    name: prometheus-postgres-exporter
    state: started
    enabled: true
