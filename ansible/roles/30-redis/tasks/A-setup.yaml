---
# Section A: Ensure Redis directories exist
- name: "A1. Ensure Redis directories exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: redis
    group: redis
    mode: "0755"
  loop:
    - /var/log/redis
    - /var/run/redis
    - /var/lib/redis

# Section B: Configure Network Routing
- name: "B1. Configure Network Routing"
  ansible.builtin.include_role:
    name: 81-asymmetric-routing
  vars:
    routing_static_routes:
      - to: "{{ redis_static_route_to }}"
        via: "{{ redis_static_route_via }}"
        metric: "{{ redis_static_route_metric }}"
  when: redis_static_route_to is defined
