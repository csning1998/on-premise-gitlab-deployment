---
- name: "Section A. Setup Redis Environment"
  ansible.builtin.include_tasks: A-setup.yaml

- name: "Section B. Configure Network Routing (R81)"
  ansible.builtin.include_role:
    name: 81-asymmetric-routing
  vars:
    routing_static_routes:
      - to: "{{ redis_static_route_to }}"
        via: "{{ redis_static_route_via }}"
        metric: "{{ redis_static_route_metric }}"
  when: redis_static_route_to is defined

- name: "Section C. Configure Redis Instance"
  ansible.builtin.include_tasks: B-configure.yaml

- name: "Section D. Manage Redis Services"
  ansible.builtin.include_tasks: C-service.yaml
