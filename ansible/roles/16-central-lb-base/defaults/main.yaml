---
# Default kernel tuning parameters for high-concurrency Central LB environments.
# These values are calibrated for burst traffic (e.g. Harbor image parallel pulls) and
# large blob transfers, but can be overridden per environment in group_vars or host_vars.
central_lb_sysctl_hardening:
  - { name: "net.core.somaxconn", value: "4096" }
  - { name: "net.ipv4.tcp_max_syn_backlog", value: "8192" }
  - { name: "net.ipv4.tcp_tw_reuse", value: "1" }
  - { name: "net.ipv4.ip_local_port_range", value: "1024 65535" }
  - { name: "net.ipv4.tcp_slow_start_after_idle", value: "0" }
  - { name: "net.core.rmem_max", value: "16777216" }
  - { name: "net.core.wmem_max", value: "16777216" }
  - { name: "net.ipv4.tcp_rmem", value: "4096 87380 16777216" }
  - { name: "net.ipv4.tcp_wmem", value: "4096 65536 16777216" }
  - { name: "net.ipv4.tcp_mtu_probing", value: "1" }
