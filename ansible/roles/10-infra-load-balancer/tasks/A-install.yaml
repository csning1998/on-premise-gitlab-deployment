---
- name: "Block A1: Kernel Parameter Tuning"
  block:
    - name: "A1a. Enable non-local binding (Essential for VIP)"
      ansible.posix.sysctl:
        name: net.ipv4.ip_nonlocal_bind
        value: "1"
        state: present
        reload: true

    - name: "A1b. Configure ARP Ignore to Prevent ARP Flux"
      ansible.posix.sysctl:
        name: "net.ipv4.conf.{{ item }}.arp_ignore"
        value: "1"
        state: present
        reload: true
      loop:
        - all
        - default

    - name: "A1c. Configure ARP Announce to Prevent ARP Flux"
      ansible.posix.sysctl:
        name: "net.ipv4.conf.{{ item }}.arp_announce"
        value: "2"
        state: present
        reload: true
      loop:
        - all
        - default

    - name: "A1d. Enable IP Forwarding that Required for L3 Traffic"
      ansible.posix.sysctl:
        name: net.ipv4.ip_forward
        value: "1"
        state: present
        reload: true

    - name: "A1e. Harden Network Stack for High Concurrency (SYN Backlog)"
      ansible.posix.sysctl:
        name: "{{ item.name }}"
        value: "{{ item.value }}"
        state: present
        reload: true
      loop: "{{ central_lb_sysctl_hardening }}"

    - name: "A1f. Disable Systemd Socket Activation for SSH (Ubuntu specific)"
      ansible.builtin.systemd:
        name: ssh.socket
        state: stopped
        enabled: false
      failed_when: false

    - name: "A1g. Configure SSHD to listen only on Management IP"
      ansible.builtin.lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?ListenAddress "
        line: "ListenAddress {{ ansible_host }}"
        state: present
      notify: Restart sshd Service

- name: "Block A2: Package Installation & User Prep"
  block:
    - name: "A2a. Ensure Service Groups exist"
      ansible.builtin.group:
        name: "{{ item }}"
        state: present
        system: true
      loop:
        - haproxy
        - keepalived

    - name: "A2b. Ensure Service Users exist (Fixed Identity)"
      ansible.builtin.user:
        name: "{{ item }}"
        group: "{{ item }}"
        shell: /usr/sbin/nologin
        system: true
        create_home: false
      loop:
        - haproxy
        - keepalived
