---
- name: Restart sshd Service
  ansible.builtin.service:
    name: ssh
    state: restarted
    enabled: true

- name: Restart Keepalived
  ansible.builtin.systemd:
    name: keepalived
    state: restarted

- name: Restart HAProxy
  ansible.builtin.systemd:
    name: haproxy
    state: restarted

- name: Restart PBR
  ansible.builtin.systemd:
    name: pbr-rules.service
    state: restarted
    daemon_reload: true
