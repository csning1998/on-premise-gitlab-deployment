---
# Ansible executes notified handlers in declaration order rather than notification order;
# this sequence represents the actual execution order independent of task notification.
- name: Reload systemd daemon
  ansible.builtin.systemd:
    daemon_reload: true

# Prevents hard failures on hosts where libvirt uses modular virtqemud and lacks these legacy unit files.
# The systemd module treats missing units as an error, unlike stopping already-stopped units.
- name: Stop legacy libvirtd units
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
  loop:
    - libvirtd.service
    - libvirtd.socket
    - libvirtd-ro.socket
    - libvirtd-admin.socket
  failed_when: false

- name: Disable libvirtd service
  ansible.builtin.systemd:
    name: libvirtd.service
    enabled: false
  failed_when: false

- name: Restart libvirtd socket
  ansible.builtin.systemd:
    name: libvirtd.socket
    state: restarted
  failed_when: false

- name: Reload firewalld
  ansible.builtin.command:
    cmd: firewall-cmd --reload
  changed_when: true
