---
- name: "D1. Copy Vault CA to system-wide trust store"
  ansible.builtin.copy:
    src: "/etc/minio/certs/CAs/root_ca.crt"
    dest: "/usr/local/share/ca-certificates/vault-root-ca.crt"
    remote_src: true
    mode: "0644"

- name: "D2. Force update CA certificates"
  ansible.builtin.command: update-ca-certificates
  register: ca_update_result
  changed_when: "'0 added, 0 removed' not in ca_update_result.stdout"

- name: "D3. Ensure Root .mc directory exists"
  ansible.builtin.file:
    path: "/root/.mc/certs/CAs"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: "D4. Trust CA for Root mc"
  ansible.builtin.copy:
    src: "/etc/minio/certs/CAs/root_ca.crt"
    dest: "/root/.mc/certs/CAs/root_ca.crt"
    remote_src: true
    owner: root
    group: root
    mode: "0644"

- name: "D5. Ensure Ansible User .mc directory exists"
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.mc/certs/CAs"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0700"
  when: ansible_user != 'root'

- name: "D6. Trust CA for Ansible User mc"
  ansible.builtin.copy:
    src: "/etc/minio/certs/CAs/root_ca.crt"
    dest: "/home/{{ ansible_user }}/.mc/certs/CAs/root_ca.crt"
    remote_src: true
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  when: ansible_user != 'root'

- name: "D7. Wait for MinIO Cluster Readiness"
  ansible.builtin.uri:
    url: "https://{{ minio_vip }}:9000/minio/health/ready"
    validate_certs: true
    ca_path: "/usr/local/share/ca-certificates/vault-root-ca.crt"
  register: minio_readiness
  until: minio_readiness.status == 200
  retries: 30
  delay: 5

- name: "D8. Configure local alias 'myminio' for Root"
  ansible.builtin.command:
    cmd: >-
      mc alias set myminio
      https://{{ minio_vip }}:9000
      {{ minio_root_user }}
      {{ minio_root_password }}
  register: mc_alias_result
  until: mc_alias_result.rc == 0
  retries: 10
  delay: 3
  changed_when: false
  no_log: true

- name: "D9. Verify MinIO Cluster Status (Deep Check)"
  ansible.builtin.command:
    cmd: mc admin info myminio
  register: mc_info
  until: mc_info.rc == 0
  retries: 10
  delay: 5
  changed_when: false
