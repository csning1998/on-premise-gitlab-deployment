---
- name: "Role 81: Configure Network Routing (Gitaly)"
  ansible.builtin.include_role:
    name: 81-utils-asymmetric-routing
  vars:
    routing_static_routes: "{{ gitaly_static_routes }}"
  when: gitaly_static_routes is defined and (gitaly_static_routes | length > 0)

- name: "Block A1: Configure Gitaly Configuration"
  block:
    - name: "A1a. Render gitlab.rb configuration for Gitaly"
      ansible.builtin.template:
        src: gitlab.rb.gitaly.j2
        dest: /etc/gitlab/gitlab.rb
        owner: root
        group: root
        mode: "0600"
      notify: Restart Gitaly

    - name: "A1b. Ensure SSL certificate directory exists"
      ansible.builtin.file:
        path: /etc/gitlab/ssl
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: "A1c. Render gitlab-secrets.json for Gitaly"
      ansible.builtin.template:
        src: gitlab-secrets.json.j2
        dest: /etc/gitlab/gitlab-secrets.json
        owner: root
        group: root
        mode: "0600"

- name: "Role 82: Prepare Environment for Vault Agent (Gitaly)"
  ansible.builtin.include_role:
    name: 82-utils-vault-agent
  vars:
    vault_agent_owner: "git"
    vault_agent_group: "git"
    vault_agent_cert_base_dir: "/etc/gitlab/ssl"
    vault_agent_post_command: "gitlab-ctl hup gitaly"
    vault_agent_ip_sans: "{{ advertise_ip }},{{ gitaly_ha_virtual_ip | default('') }}"
    vault_agent_identities: "{{ vault_agent_identities_json | from_json }}"
    vault_agent_role_id: "{{ vault_agent_identities['gitaly'].role_id }}"
    vault_agent_secret_id: "{{ vault_agent_identities['gitaly'].secret_id }}"
    vault_role_name: "{{ vault_agent_identities['gitaly'].role_name }}"
    vault_agent_common_name: "{{ vault_agent_identities['gitaly'].common_name }}"
    vault_agent_auth_path: "{{ vault_agent_identities['gitaly'].auth_path }}"

- name: "Block A2: Trust Vault CA for System and Gitaly"
  block:
    - name: "A2a. Copy Vault CA to system trust store and GitLab trusted-certs"
      ansible.builtin.copy:
        src: /etc/gitlab/ssl/ca.crt
        dest: "{{ item }}"
        remote_src: true
        owner: root
        group: root
        mode: "0644"
      loop:
        - /usr/local/share/ca-certificates/vault-ca.crt
        - /etc/gitlab/trusted-certs/vault-ca.crt
      register: gitaly_ca_copied

    - name: "A2b. Update system CA certificates"
      ansible.builtin.command:
        cmd: update-ca-certificates
      when: gitaly_ca_copied.changed

- name: "Block B: Start and Enable Gitaly Service"
  block:
    - name: "B1a. Check if gitlab-secrets.json exists"
      ansible.builtin.stat:
        path: /etc/gitlab/gitlab-secrets.json
      register: gitaly_secrets_stat

    - name: "B1b. Validate gitlab-secrets.json format"
      ansible.builtin.command:
        cmd: python3 -c "import json; json.loads(open('/etc/gitlab/gitlab-secrets.json').read())"
      register: gitaly_secrets_validation
      ignore_errors: true
      changed_when: false
      when: gitaly_secrets_stat.stat.exists

    - name: "B1c. Clean broken gitlab-secrets.json to ensure idempotency"
      ansible.builtin.file:
        path: /etc/gitlab/gitlab-secrets.json
        state: absent
      when:
        - gitaly_secrets_stat.stat.exists
        - gitaly_secrets_validation.rc is defined and gitaly_secrets_validation.rc != 0

    - name: "B1d. Check if UFW is installed"
      ansible.builtin.stat:
        path: /usr/sbin/ufw
      register: gitaly_ufw_stat

    - name: "B1e. Allow Gitaly gRPC ports"
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
        src: any
      loop:
        - "8075"
        - "8076"
      when: gitaly_ufw_stat.stat.exists

    - name: "B1f. Ensure gitlab-runsvdir service is running and enabled"
      ansible.builtin.systemd:
        name: gitlab-runsvdir
        state: started
        enabled: true

    - name: "B1g. Run GitLab reconfigure to apply Gitaly changes"
      ansible.builtin.command:
        cmd: gitlab-ctl reconfigure
      register: gitaly_reconfigure_result
      changed_when: true
