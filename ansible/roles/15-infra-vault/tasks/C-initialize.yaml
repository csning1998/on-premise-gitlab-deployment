---
- name: "Block C1: Initialize Vault Cluster (Primary Only)"
  become: true
  run_once: true
  block:
    - name: "C1a. Wait for Vault"
      ansible.builtin.wait_for:
        port: "{{ vault_port_api }}"
        delay: "{{ vault_wait_delay_seconds }}"

    - name: "C1b. Initialize Vault"
      ansible.builtin.command: >
        vault operator init \
        -key-shares={{ vault_init_key_shares }} \
        -key-threshold={{ vault_init_key_threshold }} \
        -format=json
      environment:
        VAULT_ADDR: "https://127.0.0.1:{{ vault_port_api }}"
        VAULT_SKIP_VERIFY: "true"
      register: init_result
      changed_when: init_result.rc == 0
      ignore_errors: true

    - name: "C1c. Fetch Administrative AppRole Credentials"
      community.hashi_vault.vault_kv2_get:
        url: "{{ dev_vault_url }}"
        engine_mount_point: "secret"
        path: "{{ dev_vault_api_path }}"
        validate_certs: true
        ca_cert: "{{ playbook_dir }}/../../vault/tls/ca.pem"
      register: bootstrapper_credentials
      delegate_to: localhost
      become: false

    - name: "C1d. Set AppRole Credentials"
      ansible.builtin.set_fact:
        vault_approle_role_id: "{{ bootstrapper_credentials.secret.role_id }}"
        vault_approle_secret_id: "{{ bootstrapper_credentials.secret.secret_id }}"

    - name: "C1e. Write Merged Secrets back to Vault"
      community.hashi_vault.vault_kv2_write:
        url: "{{ dev_vault_url }}"
        engine_mount_point: "secret"
        path: "{{ dev_vault_api_path }}"
        auth_method: "approle"
        role_id: "{{ vault_approle_role_id }}"
        secret_id: "{{ vault_approle_secret_id }}"
        validate_certs: true
        ca_cert: "{{ playbook_dir }}/../../vault/tls/ca.pem"
        data:
          role_id: "{{ vault_approle_role_id }}"
          secret_id: "{{ vault_approle_secret_id }}"
          prod_vault_root_token: "{{ (init_result.stdout | from_json).root_token }}"
          prod_vault_unseal_keys: "{{ (init_result.stdout | from_json).unseal_keys_b64 }}"
      delegate_to: localhost
      become: false
      when: init_result.rc == 0

  rescue:
    # vault operator init is a one-time, irreversible operation. If it succeeded during this execution
    # (init_result.rc == 0) but a later step (C1c-C1e) failed before the root
    # token and unseal keys were persisted to the bootstrap Vault, those secrets
    # only exist in this execution's in-memory init_result and would otherwise be lost,
    # leaving the cluster permanently initialized but unsealable. Preserve them
    # to a local file on the control machine before failing.
    - name: "C1-rescue1. Preserve Vault init secrets if initialization succeeded but persistence failed"
      ansible.builtin.copy:
        content: "{{ init_result.stdout }}"
        dest: "{{ playbook_dir }}/../../vault-init-emergency.json"
        mode: "0600"
      when: init_result is defined and init_result.rc == 0
      no_log: true
      delegate_to: localhost
      become: false

    - name: "Block C1: Initialize Vault Cluster (Primary Only) failed"
      vars:
        _c1_emergency_note: >-
          Vault was newly initialized during this execution but the root token and unseal keys
          could not be persisted to the bootstrap Vault; they have been saved to
          vault-init-emergency.json at the repository root on the Ansible control
          machine (mode 0600). Retrieve them manually, complete the write to the
          bootstrap Vault, then delete that file.
      ansible.builtin.fail:
        msg: >-
          {{ ansible_failed_result.msg | default('see task output above') }}
          {{ _c1_emergency_note if (init_result is defined and init_result.rc == 0) else '' }}
