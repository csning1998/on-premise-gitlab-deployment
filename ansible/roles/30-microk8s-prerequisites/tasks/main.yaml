---
- name: "Block A: Establish Certificate Trust for Containerd & OS"
  become: true
  block:
    - name: "Step A1. Ensure ca-certificates package is installed"
      ansible.builtin.apt:
        name: ca-certificates
        state: present
        update_cache: true

    - name: "Step A2. Distribute Vault PKI Service CA to OS trust store"
      ansible.builtin.copy:
        content: "{{ vault_ca_cert_b64 | b64decode }}"
        dest: /usr/local/share/ca-certificates/vault-ca.crt
        mode: "0644"
        owner: root
        group: root
      notify: Update CA Certificates

    - name: "Step A2.4. Check routing optimization for Infrastructure VIPs"
      ansible.builtin.shell: >
        set -o pipefail &&
        ip route show {{ item }} | grep -q "advmss 1300"
      args:
        executable: /bin/bash
      register: route_check
      failed_when: false
      changed_when: false
      loop:
        - "{{ vault_addr | regex_replace('^https://', '') | regex_replace(':.*$', '') }}"
        - "{{ registry_vip }}"

    - name: "Step A2.5. Inject routing optimization for Infrastructure VIPs (Vault & Harbor MTU bypass)"
      ansible.builtin.command:
        cmd: >
          ip route replace {{ item.item }}
          via {{ ansible_default_ipv4.gateway }}
          dev {{ ansible_default_ipv4.interface }}
          advmss 1300
      changed_when: item.rc != 0
      loop: "{{ route_check.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: "Step A2.4.1. Force update CA certificates to validate Vault API"
      ansible.builtin.command: update-ca-certificates
      register: ca_update_result
      changed_when: "'0 added, 0 removed' not in ca_update_result.stdout"

    - name: "Step A2.5. Download Vault PKI Issuing CA directly from Vault API"
      ansible.builtin.get_url:
        url: "{{ vault_addr | trim('/') }}/v1/pki/prod/ca/pem"
        dest: /usr/local/share/ca-certificates/vault-pki-issuing-ca.crt
        mode: "0644"
        owner: root
        group: root
        validate_certs: true
      notify: Update CA Certificates

    - name: "Step A3. Force update of CA certificates"
      ansible.builtin.command: update-ca-certificates
      changed_when: false
      notify: Restart MicroK8s Containerd

- name: "Block B: Configure Containerd Registry endpoint (MicroK8s Snap)"
  become: true
  block:
    - name: "Step B1. Pre-calculate Registry Configurations"
      ansible.builtin.set_fact:
        _etc_hosts_list: >-
          {{ ([{'host': registry_host, 'ip': registry_vip}] +
              (node_extra_hosts | default([]))) | unique(attribute='host') }}
        _containerd_registry_configs: "{{ lookup('template', 'containerd_registry_configs.j2') | from_yaml }}"

    - name: "Step B2. Ensure local DNS overrides for Registries in /etc/hosts"
      ansible.builtin.lineinfile:
        path: /etc/hosts
        regexp: '^.*\s+{{ item.host | regex_escape() }}(\s+|$)'
        line: "{{ item.ip }} {{ item.host }}"
        state: present
      loop: "{{ _etc_hosts_list }}"

    - name: "Step B3. Ensure Mirror Directories Exist"
      ansible.builtin.file:
        path: "/var/snap/microk8s/current/args/certs.d/{{ item.domain }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop: "{{ _containerd_registry_configs }}"

    - name: "Step B4. Deploy hosts.toml (Standard Registry & Inception redirection)"
      ansible.builtin.template:
        src: hosts.toml.j2
        dest: "/var/snap/microk8s/current/args/certs.d/{{ item.domain }}/hosts.toml"
        owner: root
        group: root
        mode: "0644"
      notify: Restart MicroK8s Containerd
      loop: "{{ _containerd_registry_configs }}"
