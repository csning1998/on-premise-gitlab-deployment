---
- name: "Section A: Ensure Redis directories exist"
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: redis
    group: redis
    mode: "0755"
  loop:
    - /var/log/redis
    - /var/run/redis
    - /var/lib/redis

- name: "Section B: Configure Network Routing"
  ansible.builtin.include_role:
    name: 81-asymmetric-routing
  vars:
    routing_static_routes: "{{ redis_static_routes }}"
  when: redis_static_routes is defined and redis_static_routes | length > 0

- name: "Section C: Configure Redis Server and Sentinel"
  block:
    - name: "Step C1. Create Redis server configuration"
      ansible.builtin.template:
        src: redis.conf.j2
        dest: /etc/redis/redis.conf
        owner: redis
        group: redis
        mode: "0640"
      notify: Restart redis-server

    - name: "Step C2. Create Redis Sentinel configuration"
      ansible.builtin.template:
        src: sentinel.conf.j2
        dest: /etc/redis/sentinel.conf
        owner: redis
        group: redis
        mode: "0640"
      notify: Restart redis-sentinel

- name: "Section D: Configure Vault Agent for PKI Rotation"
  ansible.builtin.include_role:
    name: 82-vault-agent
  vars:
    vault_agent_owner: "{{ redis_user }}"
    vault_agent_group: "{{ redis_group }}"
    vault_agent_cert_base_dir: "/etc/redis/certs"
    vault_agent_post_command: "systemctl restart redis-server redis-sentinel"
    vault_agent_ip_sans: "{{ advertise_ip }}"

- name: "Section E: Start Services"
  block:
    - name: "Step E1. Enable and start Redis services"
      ansible.builtin.systemd:
        name: "{{ item }}"
        state: started
        enabled: true
        daemon_reload: true
      loop:
        - redis-server
        - redis-sentinel
