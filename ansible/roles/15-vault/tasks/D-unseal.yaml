---
- name: "Block D1: Unseal Primary Node"
  become: true
  when: inventory_hostname in groups['primary']
  block:
    - name: "D1a. Check Current Vault Status"
      ansible.builtin.command: vault status -format=json
      environment:
        VAULT_ADDR: "https://127.0.0.1:{{ vault_port_api }}"
        VAULT_SKIP_VERIFY: "true"
      register: vault_status_check
      changed_when: false
      failed_when: false

    - name: "D1b. Fetch Administrative AppRole Credentials"
      community.hashi_vault.vault_kv2_get:
        url: "{{ dev_vault_url }}"
        engine_mount_point: "secret"
        path: "{{ dev_vault_api_path }}"
        validate_certs: false
      register: bootstrapper_creds
      delegate_to: localhost
      become: false
      when:
        - vault_status_check.rc == 2
        - vault_status_check.stdout | length > 0
        - (vault_status_check.stdout | from_json).sealed
      no_log: true

    - name: "D1c. Set AppRole Credentials"
      ansible.builtin.set_fact:
        vault_approle_role_id: "{{ bootstrapper_creds.secret.role_id }}"
        vault_approle_secret_id: "{{ bootstrapper_creds.secret.secret_id }}"
      when: bootstrapper_creds is not skipped
      no_log: true

    - name: "D1d. Fetch Unseal Keys from Bootstrap Vault"
      community.hashi_vault.vault_kv2_get:
        url: "{{ dev_vault_url }}"
        engine_mount_point: "secret"
        path: "{{ dev_vault_api_path }}"
        auth_method: "approle"
        role_id: "{{ vault_approle_role_id }}"
        secret_id: "{{ vault_approle_secret_id }}"
        validate_certs: false
      register: unseal_secrets
      delegate_to: localhost
      become: false
      when:
        - vault_status_check.rc == 2
        - vault_status_check.stdout | length > 0
        - (vault_status_check.stdout | from_json).sealed
      no_log: true

    - name: "D1e. Parse Unseal Keys"
      ansible.builtin.set_fact:
        vault_unseal_keys: "{{ unseal_secrets.secret.prod_vault_unseal_keys }}"
      when: unseal_secrets is not skipped

    - name: "D1f. Execute Unseal"
      ansible.builtin.command: "vault operator unseal {{ vault_unseal_keys[0] }}"
      environment:
        VAULT_ADDR: "https://127.0.0.1:{{ vault_port_api }}"
        VAULT_SKIP_VERIFY: "true"
      register: unseal_result
      changed_when: "'Sealed: false' in unseal_result.stdout"
      when: vault_unseal_keys is defined

- name: "Block D2: Raft Join and Unseal Replica Nodes"
  become: true
  when: inventory_hostname in groups['replica']
  block:
    - name: "D2a. Wait for Vault to become Initialized (Raft Join)"
      ansible.builtin.command: vault status -format=json
      environment:
        VAULT_ADDR: "https://127.0.0.1:{{ vault_port_api }}"
        VAULT_SKIP_VERIFY: "true"
      register: vault_init_check
      until:
        - vault_init_check.rc == 2
        - vault_init_check.stdout | length > 0
        - (vault_init_check.stdout | from_json).initialized
      retries: "{{ vault_unseal_retries }}"
      delay: "{{ vault_unseal_delay_seconds }}"
      changed_when: false
      failed_when: vault_init_check.rc not in [0, 2]

    - name: "D2b. Fetch Administrative AppRole Credentials"
      community.hashi_vault.vault_kv2_get:
        url: "{{ dev_vault_url }}"
        engine_mount_point: "secret"
        path: "{{ dev_vault_api_path }}"
        validate_certs: false
      register: bootstrapper_creds
      delegate_to: localhost
      become: false
      when:
        - vault_init_check.rc == 2
        - vault_init_check.stdout | length > 0
        - (vault_init_check.stdout | from_json).sealed
      no_log: true

    - name: "D2c. Set AppRole Credentials"
      ansible.builtin.set_fact:
        vault_approle_role_id: "{{ bootstrapper_creds.secret.role_id }}"
        vault_approle_secret_id: "{{ bootstrapper_creds.secret.secret_id }}"
      when: bootstrapper_creds is not skipped
      no_log: true

    - name: "D2d. Fetch Unseal Keys from Bootstrap Vault"
      community.hashi_vault.vault_kv2_get:
        url: "{{ dev_vault_url }}"
        engine_mount_point: "secret"
        path: "{{ dev_vault_api_path }}"
        auth_method: "approle"
        role_id: "{{ vault_approle_role_id }}"
        secret_id: "{{ vault_approle_secret_id }}"
        validate_certs: false
      register: unseal_secrets
      delegate_to: localhost
      become: false
      when: bootstrapper_creds is not skipped
      no_log: true

    - name: "D2e. Parse Unseal Keys"
      ansible.builtin.set_fact:
        vault_unseal_keys: "{{ unseal_secrets.secret.prod_vault_unseal_keys }}"
      when: unseal_secrets is not skipped

    - name: "D2f. Execute Unseal"
      ansible.builtin.command: "vault operator unseal {{ vault_unseal_keys[0] }}"
      environment:
        VAULT_ADDR: "https://127.0.0.1:{{ vault_port_api }}"
        VAULT_SKIP_VERIFY: "true"
      register: unseal_result
      changed_when: "'Sealed: false' in unseal_result.stdout"
      when: vault_unseal_keys is defined

- name: "Block D3: Verify Vault Cluster Availability"
  become: true
  when: inventory_hostname in groups['primary']
  block:
    - name: "D3a. Wait for Vault VIP to be Active (200 OK)"
      ansible.builtin.uri:
        url: "https://{{ vault_vip }}:443/v1/sys/health"
        validate_certs: false
        status_code: 200
      register: health_check
      until: health_check.status == 200
      retries: 60
      delay: 2
      delegate_to: localhost
      become: false
