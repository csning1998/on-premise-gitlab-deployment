---
- name: "Section A: Prepare Python Environment and Install Patroni"
  block:
    - name: "Step A1. Create Python virtual environment for Patroni"
      ansible.builtin.command:
        cmd: python3 -m venv /opt/patroni-venv
        creates: /opt/patroni-venv/bin/activate

    - name: "Step A2. Install Patroni and dependencies"
      ansible.builtin.pip:
        name:
          - patroni[etcd3]
          - psycopg2-binary
        virtualenv: /opt/patroni-venv
        virtualenv_command: /usr/bin/python3 -m venv

- name: "Section B: Stop and Disable default PostgreSQL service"
  block:
    - name: "Step B1. Ensure default postgresql service is stopped"
      ansible.builtin.systemd:
        name: postgresql
        state: stopped
        enabled: false
      # Ignore errors if the service doesn't exist (it might be postgresql@.service)
      failed_when: false

- name: "Section C: Configure Network Routing"
  ansible.builtin.include_role:
    name: 81-asymmetric-routing
  vars:
    routing_static_routes:
      - to: "{{ postgres_static_route_to }}"
        via: "{{ postgres_static_route_via }}"
        metric: "{{ postgres_static_route_metric }}"
  when: postgres_static_route_to is defined

- name: "Section D: Configure Patroni Service"
  block:
    - name: "Step D1. Create Patroni config file"
      ansible.builtin.template:
        src: patroni.yml.j2
        dest: /etc/patroni.yml
        owner: postgres
        group: postgres
        mode: "0600"
      notify: Restart Patroni

    - name: "Step D2. Create Patroni systemd service file"
      ansible.builtin.template:
        src: patroni.service.j2
        dest: /etc/systemd/system/patroni.service
        owner: root
        group: root
        mode: "0644"
      notify: Restart Patroni

- name: "Section E: Prepare Environment for Vault Agent"
  ansible.builtin.include_role:
    name: 82-vault-agent
  vars:
    vault_agent_owner: "{{ postgres_user }}"
    vault_agent_group: "{{ postgres_group }}"
    vault_agent_cert_base_dir: "/etc/postgresql/certs"
    vault_agent_post_command: "systemctl restart patroni"
    vault_agent_ip_sans: "{{ advertise_ip }},{{ postgres_ha_virtual_ip }}"

- name: "Section F: Start and Enable Patroni Service"
  block:
    - name: "Step F1. Check if UFW is installed"
      ansible.builtin.stat:
        path: /usr/sbin/ufw
      register: patroni_ufw_stat

    - name: "Step F2. Allow PostgreSQL and Patroni ports"
      community.general.ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
        src: "{{ postgres_mtls_node_subnet }}"
      loop:
        - "{{ postgres_port }}"
        - "{{ patroni_restapi_port }}"
      when: patroni_ufw_stat.stat.exists

    - name: "Step F3. Reload systemd and start Patroni"
      ansible.builtin.systemd:
        name: patroni
        state: started
        enabled: true
        daemon_reload: true
