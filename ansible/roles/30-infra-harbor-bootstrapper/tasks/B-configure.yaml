---
- name: "B1. Ensure Service Domain resolves to Localhost for Vault Agent"
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "127.0.0.1 {{ bstrap_harbor_service_domain }}"
    state: present
    regexp: "^127.0.0.1 {{ bstrap_harbor_service_domain }}$"

- name: "B2. Ensure Registry FQDN resolves to VIP for local operations"
  ansible.builtin.lineinfile:
    path: /etc/hosts
    line: "{{ bstrap_harbor_vip }} {{ bstrap_harbor_fqdn }}"
    state: present
    regexp: "^.* {{ bstrap_harbor_fqdn | replace('.', '\\.') }}$"

- name: "B3. Distribute Vault PKI Service CA to OS trust store"
  ansible.builtin.copy:
    content: "{{ vault_ca_cert_b64 | b64decode }}"
    dest: /usr/local/share/ca-certificates/vault-ca.crt
    mode: "0644"
    owner: root
    group: root
  notify: Update CA Certificates

- name: "B4. Force update CA certificates before downloading Issuing CA"
  ansible.builtin.command: update-ca-certificates
  changed_when: false

- name: "B5. Download Vault PKI Issuing CA to OS trust store"
  ansible.builtin.get_url:
    url: "{{ vault_addr | trim('/') }}/v1/pki/prod/ca/pem"
    dest: /usr/local/share/ca-certificates/vault-pki-issuing-ca.crt
    mode: "0644"
    owner: root
    group: root
    validate_certs: true
  notify: Update CA Certificates

- name: "B6. Discover Harbor UID/GID from existing directory"
  ansible.builtin.stat:
    path: "{{ harbor_pki_dir }}"
  register: harbor_dir_stat

- name: "B7. Set Harbor ID Facts"
  ansible.builtin.set_fact:
    _harbor_uid: "{{ harbor_dir_stat.stat.uid | default(0) or harbor_uid }}"
    _harbor_gid: "{{ harbor_dir_stat.stat.gid | default(0) or harbor_gid }}"
