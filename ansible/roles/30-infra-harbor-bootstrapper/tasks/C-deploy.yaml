---
- name: "C1. Retrieve Harbor Credentials"
  community.hashi_vault.vault_kv2_get:
    url: "{{ vault_endpoint }}"
    path: "{{ vault_kv_namespace }}/harbor-bootstrapper/frontend"
    engine_mount_point: "secret"
    auth_method: approle
    mount_point: "{{ vault_auth_path }}"
    role_id: "{{ vault_agent_role_id }}"
    secret_id: "{{ vault_agent_secret_id }}"
    ca_cert: "{{ vault_agent_config_dir }}/vault-ca.crt"
  register: harbor_vault_secrets

- name: "C2. Render harbor.yml"
  ansible.builtin.template:
    src: harbor.yml.j2
    dest: "{{ harbor_install_dir }}/harbor.yml"
    mode: "0644"
  register: harbor_system_config_status

- name: "C3. Run Install Script (First Time Only)"
  ansible.builtin.command:
    cmd: "./install.sh {{ harbor_installer_flags }}"
    chdir: "{{ harbor_install_dir }}"
  args:
    creates: "{{ harbor_install_dir }}/docker-compose.yml"

- name: "C4. Find docker executable"
  ansible.builtin.command: which docker
  register: docker_exec
  changed_when: false
  check_mode: false

- name: "C5. Deploy Harbor Systemd Service"
  ansible.builtin.template:
    src: harbor.service.j2
    dest: /etc/systemd/system/harbor.service
    owner: root
    group: root
    mode: "0644"
  vars:
    docker_executable: "{{ docker_exec.stdout }}"
  notify: Restart Harbor Service

- name: "C6. Enable and Start Harbor Service"
  ansible.builtin.systemd:
    name: harbor
    state: started
    enabled: true
    daemon_reload: true

- name: "C7. Reconfigure Harbor (If Config Changed)"
  ansible.builtin.command:
    cmd: "./prepare {{ harbor_installer_flags }}"
    chdir: "{{ harbor_install_dir }}"
  when:
    - harbor_system_config_status.changed
    - not (ansible_check_mode | bool)
  changed_when: true
  notify: Restart Harbor Service
