---
- name: "Block A1: Configure Data Storage Volume"
  become: true
  vars:
    data_device: "{{ hostvars[inventory_hostname].attached_volumes[0].device_name }}"
  block:
    - name: "A1a. Format to ext4: {{ data_device }}"
      community.general.filesystem:
        fstype: ext4
        dev: "{{ data_device }}"

    - name: "A1b. Ensure Harbor Data Directory Exists"
      ansible.builtin.file:
        path: "{{ harbor_data_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: "A1c. Mount to Harbor Data Directory: {{ data_device }}"
      ansible.posix.mount:
        path: "{{ harbor_data_dir }}"
        src: "{{ data_device }}"
        fstype: ext4
        opts: defaults,noatime,nodiratime
        state: mounted

  rescue:
    - name: "Block A1: Configure Data Storage Volume failed"
      ansible.builtin.fail:
        msg: "{{ ansible_failed_result.msg | default('see task output above') }}"
