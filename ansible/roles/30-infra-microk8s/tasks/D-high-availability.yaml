---
- name: "Block D1: Join this node to the MicroK8s HA cluster"
  become: true
  block:
    - name: "D1a. Define the primary node from inventory"
      ansible.builtin.set_fact:
        primary_node: "{{ (groups['microk8s'] | default([]) | intersect(groups['primary'] | default([]))) | first }}"

    - name: "D1b. Wait for MicroK8s to be ready on the primary node"
      ansible.builtin.command:
        cmd: "microk8s status --wait-ready"
      delegate_to: "{{ primary_node }}"
      changed_when: false

    - name: "D1c. Get the cluster join token from the primary node"
      ansible.builtin.command:
        cmd: "microk8s add-node"
      delegate_to: "{{ primary_node }}"
      changed_when: false
      register: add_node_result

    - name: "D1d. Extract the join command for control-plane nodes"
      ansible.builtin.set_fact:
        join_command: "{{ add_node_result.stdout_lines | select('search', 'microk8s join') | first }}"

    - name: "D1e. Fail if join command could not be retrieved"
      ansible.builtin.fail:
        msg: "Could not retrieve a valid join command from the primary node."
      when: join_command is not defined or join_command | length == 0

    - name: "D1f. Wait for MicroK8s to be ready on the current node"
      ansible.builtin.command:
        cmd: "microk8s status --wait-ready"
      register: wait_ready_result
      changed_when: false
      until: wait_ready_result.rc == 0
      retries: 20
      delay: 5

    - name: "D1g. Check if node is already joined (Idempotency Check)"
      ansible.builtin.command: microk8s status
      register: microk8s_status_check
      changed_when: false
      until: microk8s_status_check.rc == 0
      retries: 10
      delay: 3

    - name: "D1h. Execute the join command on the current node"
      ansible.builtin.command:
        cmd: "{{ join_command }}"
      register: join_command_output
      changed_when: true
      when:
        - microk8s_status_check.rc == 0
        - hostvars[primary_node]['advertise_ip'] not in microk8s_status_check.stdout
      failed_when:
        - "'already known to dqlite' not in join_command_output.stderr"
        - "'already known to dqlite' not in join_command_output.stdout"
        - join_command_output.rc > 0

  rescue:
    - name: "Block D1: Join this node to the MicroK8s HA cluster failed"
      ansible.builtin.fail:
        msg: "{{ ansible_failed_result.msg | default('see task output above') }}"
