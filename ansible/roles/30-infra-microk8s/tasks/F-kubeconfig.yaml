---
- name: "Block F1: Collect Cluster Certificates and Template Kubeconfig"
  become: true
  block:
    - name: "F1a. Create .kube directory for the SSH user"
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.kube"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0750"

    - name: "F1b. Slurp Cluster Certificates"
      ansible.builtin.slurp:
        src: "/var/snap/microk8s/current/certs/{{ item }}"
      loop:
        - ca.crt
        - client.crt
        - client.key
      register: cluster_certs

    - name: "F1c. Set Certificate Facts"
      ansible.builtin.set_fact:
        ca_crt_b64: "{{ cluster_certs.results[0].content }}"
        client_crt_b64: "{{ cluster_certs.results[1].content }}"
        client_key_b64: "{{ cluster_certs.results[2].content }}"

    - name: "F1d. Render and Place Kubeconfig on Node"
      ansible.builtin.template:
        src: kubeconfig.yaml.j2
        dest: "/home/{{ ansible_user }}/.kube/config"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0600"

- name: "Block F2: Upload Kubeconfig to Vault"
  run_once: true
  block:
    - name: "F2a. Render Kubeconfig Locally for Vault"
      ansible.builtin.set_fact:
        final_kubeconfig_b64: "{{ lookup('ansible.builtin.template', 'kubeconfig.yaml.j2') | b64encode }}"

    - name: "Block F2b: Upload Kubeconfig to Vault KV"
      delegate_to: localhost
      become: false
      block:
        - name: "F2ba. Create temporary CA file for Vault"
          ansible.builtin.tempfile:
            state: file
            suffix: .crt
          register: vault_ca_file

        - name: "F2bb. Write Vault CA to temp file"
          ansible.builtin.copy:
            content: "{{ vault_ca_cert_b64 | b64decode }}"
            dest: "{{ vault_ca_file.path }}"
            mode: "0600"

        - name: "F2bc. Upload Kubeconfig to Vault KV"
          community.hashi_vault.vault_kv2_write:
            url: "{{ vault_addr | trim('/') }}"
            path: "on-premise-gitlab-deployment/infrastructure/kubeconfig/{{ service_name }}"
            engine_mount_point: "secret"
            auth_method: approle
            mount_point: "{{ vault_auth_path }}"
            role_id: "{{ vault_agent_role_id }}"
            secret_id: "{{ vault_agent_secret_id }}"
            validate_certs: true
            ca_cert: "{{ vault_ca_file.path }}"
            data:
              content_b64: "{{ final_kubeconfig_b64 }}"
      always:
        - name: "F2c. Clean up temporary Vault CA file"
          ansible.builtin.file:
            path: "{{ vault_ca_file.path }}"
            state: absent
          when: vault_ca_file.path is defined
