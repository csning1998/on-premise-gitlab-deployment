---
- name: "Block E1: Configure and enable MicroK8s addons"
  become: true
  block:
    - name: "E1a. Wait for MicroK8s API stability"
      ansible.builtin.command:
        cmd: "microk8s status --wait-ready"
      changed_when: false

    - name: "E1b. Enable core addons for MicroK8s"
      ansible.builtin.command:
        cmd: "microk8s enable {{ item }}"
      loop: "{{ microk8s_addons }}"
      register: enable_result
      changed_when: "'is already enabled' not in enable_result.stdout"
      retries: 5
      delay: 10
      until: enable_result.rc == 0

    - name: "E1c. Enable MetalLB with defined VIP range"
      ansible.builtin.command:
        cmd: "microk8s enable metallb:{{ metallb_ip_range }}"
      register: metallb_result
      changed_when: "'MetalLB is already enabled' not in metallb_result.stdout"
      when: metallb_ip_range is defined
      retries: 5
      delay: 10
      until: metallb_result.rc == 0

  rescue:
    - name: "Block E1: Configure and enable MicroK8s addons failed"
      ansible.builtin.fail:
        msg: "{{ ansible_failed_result.msg | default('see task output above') }}"
