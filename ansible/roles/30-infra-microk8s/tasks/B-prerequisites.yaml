---
- name: "Block B1: Establish Certificate Trust for Containerd & OS"
  become: true
  block:
    - name: "B1a. Ensure ca-certificates package is installed"
      ansible.builtin.apt:
        name: ca-certificates
        state: present
        update_cache: true

    - name: "B1b. Distribute Vault PKI Service CA to OS trust store"
      ansible.builtin.copy:
        content: "{{ vault_ca_cert_b64 | b64decode }}"
        dest: /usr/local/share/ca-certificates/vault-ca.crt
        mode: "0644"
        owner: root
        group: root
      notify: Update CA Certificates

    - name: "B1e. Force update CA certificates to validate Vault API"
      ansible.builtin.command: update-ca-certificates
      register: ca_update_result
      changed_when: "'0 added, 0 removed' not in ca_update_result.stdout"

    - name: "B1f. Download Vault PKI Issuing CA directly from Vault API"
      ansible.builtin.get_url:
        url: "{{ vault_endpoint | trim('/') }}/v1/pki/prod/ca/pem"
        dest: /usr/local/share/ca-certificates/vault-pki-issuing-ca.crt
        mode: "0644"
        owner: root
        group: root
        validate_certs: true
      notify: Update CA Certificates

    - name: "B1g. Force update of CA certificates"
      ansible.builtin.command: update-ca-certificates
      changed_when: false
      notify: Restart MicroK8s Containerd

- name: "Block B2: Configure Containerd Registry endpoint (MicroK8s Snap)"
  become: true
  block:
    - name: "B2a. Pre-calculate Registry Configurations"
      ansible.builtin.set_fact:
        _containerd_registry_configs: "{{ lookup('template', 'containerd_registry_configs.j2') | from_yaml }}"

    - name: "B2c. Ensure Mirror Directories Exist"
      ansible.builtin.file:
        path: "/var/snap/microk8s/current/args/certs.d/{{ item.domain }}"
        state: directory
        owner: root
        group: root
        mode: "0755"
      loop: "{{ _containerd_registry_configs }}"

    - name: "B2d. Deploy hosts.toml (Standard Registry & Inception redirection)"
      ansible.builtin.template:
        src: hosts.toml.j2
        dest: "/var/snap/microk8s/current/args/certs.d/{{ item.domain }}/hosts.toml"
        owner: root
        group: root
        mode: "0644"
      notify: Restart MicroK8s Containerd
      loop: "{{ _containerd_registry_configs }}"
