---
# Infrastructure Handlers
- name: Update CA Certificates
  ansible.builtin.command: update-ca-certificates
  changed_when: false

# MicroK8s Management Handlers
- name: Restart MicroK8s
  become: true
  ansible.builtin.command: snap restart microk8s
  listen: "Restart MicroK8s"

- name: Restart microk8s service
  listen: "Restart microk8s service"
  become: true
  ansible.builtin.command:
    cmd: "snap restart microk8s"

- name: Restart MicroK8s Containerd
  ansible.builtin.command: snap restart microk8s.daemon-containerd
  listen: "Restart MicroK8s Containerd"

- name: Refresh MicroK8s Server Certs
  become: true
  ansible.builtin.command: microk8s refresh-certs --cert server.crt
  listen: "Refresh MicroK8s Server Certs"
