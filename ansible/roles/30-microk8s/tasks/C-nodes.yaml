---
- name: "Block C1: Fix MicroK8s Network & Certificates (Host-only)"
  become: true
  block:
    - name: "C1a. Detect Host-only IP"
      ansible.builtin.set_fact:
        hostonly_ip: "{{ advertise_ip }}"

    - name: "C1b. Debug Host-only IP"
      ansible.builtin.debug:
        msg: "Detected Host-only IP: {{ hostonly_ip }}"

    - name: "C1c. Configure Kubelet node-ip arg"
      ansible.builtin.lineinfile:
        path: /var/snap/microk8s/current/args/kubelet
        line: "--node-ip={{ hostonly_ip }}"
        regexp: "^--node-ip="
        create: true
        mode: "0644"

    - name: "C1d. Configure API Server advertise-address arg"
      ansible.builtin.lineinfile:
        path: /var/snap/microk8s/current/args/kube-apiserver
        regexp: "^--advertise-address="
        line: "--advertise-address={{ hostonly_ip }}"
        create: true
        mode: "0644"

    - name: "C1e. Add Host-only IP to CSR template"
      ansible.builtin.lineinfile:
        path: /var/snap/microk8s/current/certs/csr.conf.template
        insertafter: "^IP.2 ="
        line: "IP.100 = {{ hostonly_ip }}"
        regexp: "^IP.100 ="

    - name: "C1f. Check if Kubelet Certificate includes Host-only IP in SAN"
      ansible.builtin.shell: |
        set -o pipefail
        openssl x509 -in /var/snap/microk8s/current/certs/kubelet.crt -text -noout \
          | grep -E "IP Address:{{ hostonly_ip }}(,|$)"
      args:
        executable: /bin/bash
      register: kubelet_cert_check
      failed_when: false
      changed_when: false

    - name: "C1g. Ensure MicroK8s is stopped if certificate fix is needed"
      ansible.builtin.command:
        cmd: "microk8s stop"
      when: kubelet_cert_check.rc != 0
      changed_when: true

    - name: "C1h. Generate OpenSSL config for Kubelet (Force IP SAN)"
      ansible.builtin.template:
        src: microk8s-kubelet.conf.j2
        dest: "/var/snap/microk8s/current/certs/kubelet.conf"
        mode: "0644"
      when: kubelet_cert_check.rc != 0

    - name: "C1i. Ensure Kubelet Private Key exists"
      ansible.builtin.command: >-
        openssl genrsa -out /var/snap/microk8s/current/certs/kubelet.key 2048
      when: kubelet_cert_check.rc != 0
      changed_when: true

    - name: "C1j. Secure Kubelet Private Key permissions"
      ansible.builtin.file:
        path: /var/snap/microk8s/current/certs/kubelet.key
        mode: "0600"
        owner: root
        group: root
      when: kubelet_cert_check.rc != 0

    - name: "C1k. Generate Kubelet CSR"
      ansible.builtin.command: >-
        openssl req -new -key /var/snap/microk8s/current/certs/kubelet.key
        -out /var/snap/microk8s/current/certs/kubelet.csr
        -config /var/snap/microk8s/current/certs/kubelet.conf
      when: kubelet_cert_check.rc != 0
      changed_when: true

    - name: "C1l. Sign Kubelet Certificate with Cluster CA"
      ansible.builtin.command: >-
        openssl x509 -req -in /var/snap/microk8s/current/certs/kubelet.csr
        -CA /var/snap/microk8s/current/certs/ca.crt
        -CAkey /var/snap/microk8s/current/certs/ca.key
        -CAcreateserial
        -out /var/snap/microk8s/current/certs/kubelet.crt
        -days 3650 -extensions v3_req
        -extfile /var/snap/microk8s/current/certs/kubelet.conf
      when: kubelet_cert_check.rc != 0
      changed_when: true

- name: "Block C2: Stabilize MicroK8s & Built-in Calico"
  become: true
  block:
    - name: "C2a. Ensure CNI configuration directory exists"
      ansible.builtin.file:
        path: /var/snap/microk8s/current/args/cni-network
        state: directory
        mode: "0755"
        owner: root
        group: root

    - name: "C2b. Ensure MicroK8s service is started"
      ansible.builtin.command:
        cmd: "microk8s start"
      register: microk8s_start
      changed_when: "'Started' in microk8s_start.stdout"

    - name: "C2c: Wait for Kubernetes API to be available"
      ansible.builtin.command:
        cmd: "kubectl get nodes"
      register: kubectl_check
      until: kubectl_check.rc == 0
      retries: 10
      delay: 6
      changed_when: false

    - name: "C2d: Get list of all node names known to Kubernetes"
      ansible.builtin.command:
        cmd: "kubectl get nodes -o jsonpath='{.items[*].metadata.name}'"
      register: kube_nodes_result
      changed_when: false

    - name: "C2e: Identify stale nodes (nodes in k8s but not in inventory)"
      ansible.builtin.set_fact:
        stale_nodes: "{{ kube_nodes_result.stdout.split() | difference(groups['microk8s']) }}"

    - name: "C2f: Remove stale nodes from the cluster"
      ansible.builtin.command:
        cmd: "kubectl delete node {{ item }}"
      loop: "{{ stale_nodes }}"
      when: stale_nodes is defined and stale_nodes | length > 0
      changed_when: true
