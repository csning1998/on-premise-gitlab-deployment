---
- name: "Section A: Configure Network Routing"
  ansible.builtin.include_role:
    name: 81-asymmetric-routing
  vars:
    routing_static_routes:
      - to: "{{ dev_harbor_static_route_to }}"
        via: "{{ dev_harbor_static_route_via }}"
        metric: "{{ dev_harbor_static_route_metric }}"
  when: dev_harbor_static_route_to is defined

- name: "Section B: Configure Data Storage Volume"
  become: true
  vars:
    data_device: "{{ hostvars[inventory_hostname].attached_volumes[0].device_name }}"
  block:
    - name: "Step B1. Format to ext4: {{ data_device }}"
      community.general.filesystem:
        fstype: ext4
        dev: "{{ data_device }}"

    - name: "Step B2. Ensure Harbor Data Directory Exists"
      ansible.builtin.file:
        path: "{{ harbor_data_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: "Step B3. Mount to Harbor Data Directory: {{ data_device }}"
      ansible.posix.mount:
        path: "{{ harbor_data_dir }}"
        src: "{{ data_device }}"
        fstype: ext4
        opts: defaults,noatime,nodiratime
        state: mounted

- name: "Section C: Configure Vault Agent for PKI Rotation"
  become: true
  block:
    - name: "Step C1. Ensure Service Domain resolves to Localhost for Vault Agent"
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "127.0.0.1 {{ dev_harbor_service_domain }}"
        state: present
        regexp: "^127.0.0.1 {{ dev_harbor_service_domain }}$"

    - name: "Step C2. Ensure Registry FQDN resolves to VIP for local operations"
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ dev_harbor_vip }} {{ dev_harbor_fqdn }}"
        state: present
        regexp: "^.* {{ dev_harbor_fqdn | replace('.', '\\.') }}$"

    - name: "Step C3. Distribute Vault PKI Service CA to OS trust store"
      ansible.builtin.copy:
        content: "{{ vault_ca_cert_b64 | b64decode }}"
        dest: /usr/local/share/ca-certificates/vault-ca.crt
        mode: "0644"
        owner: root
        group: root
      notify: Update CA Certificates

    - name: "Step C4. Force update CA certificates before downloading Issuing CA"
      ansible.builtin.command: update-ca-certificates
      changed_when: false

    - name: "Step C5. Download Vault PKI Issuing CA to OS trust store"
      ansible.builtin.get_url:
        url: "{{ vault_addr | trim('/') }}/v1/pki/prod/ca/pem"
        dest: /usr/local/share/ca-certificates/vault-pki-issuing-ca.crt
        mode: "0644"
        owner: root
        group: root
        validate_certs: true
      notify: Update CA Certificates

- name: "Section D: Prepare Environment for Vault Agent"
  ansible.builtin.include_role:
    name: 82-vault-agent
  vars:
    vault_agent_owner: "root"
    vault_agent_group: "root"
    vault_agent_cert_base_dir: "{{ harbor_pki_dir }}"
    vault_agent_cert_dirs:
      - "{{ harbor_pki_dir }}"
      - "{{ harbor_config_cert_dir }}"
    vault_agent_wait_file: "{{ harbor_cert_path }}"
    vault_agent_ip_sans: "{{ advertise_ip }},{{ dev_harbor_vip }}"
    vault_agent_post_command: |
      cp {{ harbor_cert_path }} {{ harbor_config_cert_dir }}/server.crt
      cp {{ harbor_key_path }} {{ harbor_config_cert_dir }}/server.key
      chmod 0644 {{ harbor_config_cert_dir }}/server.crt
      chmod 0600 {{ harbor_config_cert_dir }}/server.key
      docker ps -q -f name=^nginx$ | grep -q . && docker exec -i nginx nginx -s reload || true

- name: "Section E: Fetch Secrets from Vault"
  become: true
  block:
    - name: "Step E1. Retrieve Harbor Credentials"
      community.hashi_vault.vault_kv2_get:
        url: "{{ vault_addr }}"
        path: "on-premise-gitlab-deployment/harbor-bootstrapper/app"
        engine_mount_point: "secret"
        auth_method: approle
        mount_point: "{{ vault_auth_path }}"
        role_id: "{{ vault_agent_role_id }}"
        secret_id: "{{ vault_agent_secret_id }}"
        ca_cert: "{{ vault_agent_config_dir }}/vault-ca.crt"
      register: harbor_vault_secrets

- name: "Section F: Configure Harbor"
  become: true
  block:
    - name: "Step F1. Render harbor.yml"
      ansible.builtin.template:
        src: harbor.yml.j2
        dest: "{{ harbor_install_dir }}/harbor.yml"
        mode: "0644"
      register: harbor_system_config_status

    - name: "Step F2. Run Install Script (First Time Only)"
      ansible.builtin.command:
        cmd: "./install.sh --with-trivy"
        chdir: "{{ harbor_install_dir }}"
      args:
        creates: "{{ harbor_install_dir }}/docker-compose.yml"

    - name: "Step F3. Find docker executable"
      ansible.builtin.command: which docker
      register: docker_exec
      changed_when: false
      check_mode: false

    - name: "Step F4. Deploy Harbor Systemd Service"
      ansible.builtin.template:
        src: harbor.service.j2
        dest: /etc/systemd/system/harbor.service
        owner: root
        group: root
        mode: "0644"
      vars:
        docker_executable: "{{ docker_exec.stdout }}"
      notify: Restart Harbor Service

    - name: "Step F5. Enable and Start Harbor Service"
      ansible.builtin.systemd:
        name: harbor
        state: started
        enabled: true
        daemon_reload: true

    - name: "Step F6. Reconfigure Harbor (If Config Changed)"
      ansible.builtin.shell:
        cmd: |
          ./prepare
        chdir: "{{ harbor_install_dir }}"
      when:
        - harbor_system_config_status.changed
        - not (ansible_check_mode | bool)
      changed_when: true
      notify: Restart Harbor Service

- name: "Section G: Verification"
  block:
    - name: "Step G0. Force update of CA certificates"
      ansible.builtin.command: update-ca-certificates
      changed_when: false

    - name: "Step G1. Wait for Harbor Health (HTTPS)"
      ansible.builtin.uri:
        url: "https://{{ dev_harbor_fqdn }}/api/v2.0/health"
        validate_certs: true
        ca_path: "/etc/vault.d/vault-ca.crt"
        status_code: 200
        return_content: true
      register: result
      until: result.status == 200
      retries: 30
      delay: 10

- name: "Section H: Install Utilities for Artifact Management"
  become: true
  block:
    - name: "Step H1. Download Helm installation script"
      ansible.builtin.get_url:
        url: "{{ helm_install_script_url }}"
        dest: /tmp/get_helm.sh
        mode: "0700"
        checksum: "{{ helm_install_script_checksum }}"

    - name: "Step H2. Execute Helm installation script"
      ansible.builtin.command:
        cmd: /tmp/get_helm.sh
        creates: /usr/local/bin/helm
      environment:
        DESIRED_VERSION: "{{ helm_version }}"
