---
- name: "Section A: Configure Network Routing"
  ansible.builtin.include_role:
    name: 81-asymmetric-routing
  vars:
    routing_static_routes: "{{ dev_harbor_static_routes }}"
  when: dev_harbor_static_routes is defined and dev_harbor_static_routes | length > 0

- name: "Section B: Configure Data Storage Volume"
  become: true
  vars:
    data_device: "{{ hostvars[inventory_hostname].attached_volumes[0].device_name }}"
  block:
    - name: "Step B1. Format to ext4: {{ data_device }}"
      community.general.filesystem:
        fstype: ext4
        dev: "{{ data_device }}"

    - name: "Step B2. Ensure Harbor Data Directory Exists"
      ansible.builtin.file:
        path: "{{ harbor_data_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: "Step B3. Mount to Harbor Data Directory: {{ data_device }}"
      ansible.posix.mount:
        path: "{{ harbor_data_dir }}"
        src: "{{ data_device }}"
        fstype: ext4
        opts: defaults,noatime,nodiratime
        state: mounted

- name: "Section C: Configure Vault Agent for PKI Rotation"
  become: true
  block:
    - name: "Step C1. Ensure Vault Binary is installed"
      ansible.builtin.include_role:
        name: 07-base-vault
      vars:
        vault_install_only: true

    - name: "Step C2. Ensure Service Domain resolves to Localhost for Vault Agent"
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "127.0.0.1 {{ dev_harbor_service_domain }}"
        state: present
        regexp: "^127.0.0.1 {{ dev_harbor_service_domain }}$"

    - name: "Step C2.1. Ensure Registry FQDN resolves to VIP for local operations"
      ansible.builtin.lineinfile:
        path: /etc/hosts
        line: "{{ dev_harbor_vip }} {{ dev_harbor_fqdn }}"
        state: present
        regexp: "^.* {{ dev_harbor_fqdn | replace('.', '\\.') }}$"

    - name: "Step C3. Create Vault Agent Config Directory"
      ansible.builtin.file:
        path: "{{ vault_agent_config_dir }}/approle"
        state: directory
        owner: vault
        group: vault
        mode: "0750"

    - name: "Step C4. Write AppRole Credentials"
      ansible.builtin.copy:
        content: "{{ item.content }}"
        dest: "{{ vault_agent_config_dir }}/approle/{{ item.file }}"
        owner: vault
        group: vault
        mode: "0600"
      loop:
        - { file: "role_id", content: "{{ vault_agent_role_id }}" }
        - { file: "secret_id", content: "{{ vault_agent_secret_id }}" }
      no_log: true
      notify: Restart Vault Agent

    - name: "Step C5. Distribute Vault PKI Service CA to OS trust store"
      ansible.builtin.copy:
        content: "{{ vault_ca_cert_b64 | b64decode }}"
        dest: /usr/local/share/ca-certificates/vault-ca.crt
        mode: "0644"
        owner: root
        group: root
      notify: Update CA Certificates

    - name: "Step C5.1. Copy Vault CA Certificate for Vault Agent"
      ansible.builtin.copy:
        content: "{{ vault_ca_cert_b64 | b64decode }}"
        dest: "{{ vault_agent_config_dir }}/vault-ca.crt"
        owner: vault
        group: vault
        mode: "0644"

    - name: "Step C5.1.1. Force update CA certificates to validate Vault API"
      ansible.builtin.command: update-ca-certificates
      changed_when: false

    - name: "Step C5.2. Download Vault PKI Issuing CA to OS trust store"
      ansible.builtin.get_url:
        url: "{{ vault_addr | trim('/') }}/v1/pki/prod/ca/pem"
        dest: /usr/local/share/ca-certificates/vault-pki-issuing-ca.crt
        mode: "0644"
        owner: root
        group: root
        validate_certs: true
      notify: Update CA Certificates

    - name: "Step C6. Ensure Harbor PKI Directory Exists"
      ansible.builtin.file:
        path: "{{ harbor_pki_dir }}"
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: "Step C7. Configure Vault Agent (vault-agent.hcl)"
      ansible.builtin.template:
        src: vault-agent.hcl.j2
        dest: "{{ vault_agent_config_dir }}/vault-agent.hcl"
        owner: vault
        group: vault
        mode: "0640"
      notify: Restart Vault Agent

    - name: "Step C8. Configure Vault Agent Service"
      ansible.builtin.template:
        src: vault-agent.service.j2
        dest: /etc/systemd/system/vault-agent.service
        owner: root
        group: root
        mode: "0644"
      notify: Restart Vault Agent

    - name: "Step C9. Start Vault Agent and Wait for Certs"
      ansible.builtin.systemd:
        name: vault-agent
        state: started
        enabled: true
        daemon_reload: true

    - name: "Step C10. Flush handlers to restart Vault Agent immediately if config changed"
      ansible.builtin.meta: flush_handlers

    - name: "Step C11. Wait for Certificates to be generated"
      ansible.builtin.wait_for:
        path: "{{ harbor_cert_path }}"
        timeout: 60
        msg: "Timeout waiting for Vault Agent to generate Harbor certificates."

    - name: "Step C12. Verify Certificate Validity"
      ansible.builtin.command:
        cmd: "openssl x509 -in {{ harbor_cert_path }} -noout -checkend 0"
      changed_when: false

- name: "Section D: Fetch Secrets from Vault"
  become: true
  block:
    - name: "Step D1. Retrieve Harbor Credentials"
      community.hashi_vault.vault_kv2_get:
        url: "{{ vault_addr }}"
        path: "on-premise-gitlab-deployment/harbor-bootstrapper/app"
        engine_mount_point: "secret"
        auth_method: approle
        mount_point: "{{ vault_auth_path }}"
        role_id: "{{ vault_agent_role_id }}"
        secret_id: "{{ vault_agent_secret_id }}"
        ca_cert: "{{ vault_agent_config_dir }}/vault-ca.crt"
      register: harbor_vault_secrets
      # no_log: true

- name: "Section E: Configure Harbor"
  become: true
  block:
    - name: "Step E1. Render harbor.yml"
      ansible.builtin.template:
        src: harbor.yml.j2
        dest: "{{ harbor_install_dir }}/harbor.yml"
        mode: "0644"
      register: harbor_system_config_status

    - name: "Step E2. Run Install Script (First Time Only)"
      ansible.builtin.command:
        cmd: "./install.sh --with-trivy"
        chdir: "{{ harbor_install_dir }}"
      args:
        creates: "{{ harbor_install_dir }}/docker-compose.yml"

    - name: "Step E3. Find docker executable"
      ansible.builtin.command: which docker
      register: docker_exec
      changed_when: false
      check_mode: false

    - name: "Step E4. Deploy Harbor Systemd Service"
      ansible.builtin.template:
        src: harbor.service.j2
        dest: /etc/systemd/system/harbor.service
        owner: root
        group: root
        mode: "0644"
      vars:
        docker_executable: "{{ docker_exec.stdout }}"
      notify: Restart Harbor Service

    - name: "Step E5. Enable and Start Harbor Service"
      ansible.builtin.systemd:
        name: harbor
        state: started
        enabled: true
        daemon_reload: true

    - name: "Step E6. Reconfigure Harbor (If Config Changed)"
      ansible.builtin.shell:
        cmd: |
          ./prepare
        chdir: "{{ harbor_install_dir }}"
      when:
        - harbor_system_config_status.changed
        - not (ansible_check_mode | bool)
      changed_when: true
      notify: Restart Harbor Service

- name: "Section F: Verification"
  block:
    - name: "Step F0. Force update of CA certificates"
      ansible.builtin.command: update-ca-certificates
      changed_when: false

    - name: "Step F1. Wait for Harbor Health (HTTPS)"
      ansible.builtin.uri:
        url: "https://{{ dev_harbor_fqdn }}/api/v2.0/health"
        validate_certs: true
        ca_path: "/etc/vault.d/vault-ca.crt"
        status_code: 200
        return_content: true
      register: result
      until: result.status == 200
      retries: 30
      delay: 10

- name: "Section G: Install Utilities for Artifact Management"
  become: true
  block:
    - name: "Step G1. Download Helm installation script"
      ansible.builtin.get_url:
        url: "{{ helm_install_script_url }}"
        dest: /tmp/get_helm.sh
        mode: "0700"
        checksum: "{{ helm_install_script_checksum }}"

    - name: "Step G2. Execute Helm installation script"
      ansible.builtin.command:
        cmd: /tmp/get_helm.sh
        creates: /usr/local/bin/helm
      environment:
        DESIRED_VERSION: "{{ helm_version }}"
