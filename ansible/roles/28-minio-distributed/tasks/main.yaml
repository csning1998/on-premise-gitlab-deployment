---
- name: "Section A: Prepare Data Drives"
  block:
    - name: "Step A1. Install XFS progs"
      ansible.builtin.apt:
        name: xfsprogs
        state: present
        update_cache: true

    - name: "Step A2. Create XFS filesystem on data drives"
      community.general.filesystem:
        fstype: xfs
        dev: "{{ item.device }}"
      loop: "{{ minio_data_drives }}"

    - name: "Step A3. Create mount points"
      ansible.builtin.file:
        path: "{{ item.mount_point }}"
        state: directory
        owner: "{{ minio_user }}"
        group: "{{ minio_group }}"
        mode: "0750"
      loop: "{{ minio_data_drives }}"

    - name: "Step A4. Mount drives and persist in fstab"
      ansible.posix.mount:
        path: "{{ item.mount_point }}"
        src: "{{ item.device }}"
        fstype: xfs
        opts: noatime
        state: mounted
      loop: "{{ minio_data_drives }}"

    - name: "Step A5. Ensure ownership of mount points (Recursive)"
      ansible.builtin.file:
        path: "{{ item.mount_point }}"
        state: directory
        owner: "{{ minio_user }}"
        group: "{{ minio_group }}"
        recurse: true
      loop: "{{ minio_data_drives }}"

- name: "Section B: Configure Distributed MinIO"
  block:
    - name: "Step B1. Create MinIO environment file"
      ansible.builtin.template:
        src: minio-default.j2
        dest: /etc/default/minio
        owner: root
        group: root
        mode: "0600"
      notify: Restart MinIO

- name: "Section C: Configure Network Routing"
  ansible.builtin.include_role:
    name: 81-asymmetric-routing
  vars:
    routing_static_routes: "{{ minio_static_routes }}"
  when: minio_static_routes is defined and minio_static_routes | length > 0

- name: "Section D: Configure Vault Agent for PKI Rotation"
  ansible.builtin.include_role:
    name: 82-vault-agent
  vars:
    vault_agent_owner: "{{ minio_user }}"
    vault_agent_group: "{{ minio_group }}"
    vault_agent_cert_base_dir: "/etc/minio/certs"
    vault_agent_cert_dirs:
      - "/etc/minio/certs"
      - "/etc/minio/certs/CAs"
    vault_agent_cert_name: "public.crt"
    vault_agent_key_name: "private.key"
    vault_agent_ca_name: "CAs/root_ca.crt"
    vault_agent_wait_file: "/etc/minio/certs/public.crt"
    vault_agent_post_command: "systemctl restart minio"
    vault_agent_ip_sans: "{{ advertise_ip }},{{ minio_ha_virtual_ip }}"

- name: "Section E: Start Service"
  ansible.builtin.systemd:
    name: minio
    state: started
    enabled: true
    daemon_reload: true

- name: "Section F: Configure MinIO Client Trust & Verification"
  block:
    - name: "Task F0. Copy Vault CA to system-wide trust store"
      ansible.builtin.copy:
        src: "/etc/minio/certs/CAs/root_ca.crt"
        dest: "/usr/local/share/ca-certificates/vault-root-ca.crt"
        remote_src: true
        mode: "0644"

    - name: "Task F1. Force update CA certificates"
      ansible.builtin.command: update-ca-certificates
      register: ca_update_result
      changed_when: "'0 added, 0 removed' not in ca_update_result.stdout"

    - name: "Task F2. Ensure Root .mc directory exists"
      ansible.builtin.file:
        path: "/root/.mc/certs/CAs"
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: "Task F3. Trust CA for Root mc"
      ansible.builtin.copy:
        src: "/etc/minio/certs/CAs/root_ca.crt"
        dest: "/root/.mc/certs/CAs/root_ca.crt"
        remote_src: true
        owner: root
        group: root
        mode: "0644"

    - name: "Task F4. Ensure Ansible User .mc directory exists"
      ansible.builtin.file:
        path: "/home/{{ ansible_user }}/.mc/certs/CAs"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0700"
      when: ansible_user != 'root'

    - name: "Task F5. Trust CA for Ansible User mc"
      ansible.builtin.copy:
        src: "/etc/minio/certs/CAs/root_ca.crt"
        dest: "/home/{{ ansible_user }}/.mc/certs/CAs/root_ca.crt"
        remote_src: true
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0644"
      when: ansible_user != 'root'

    - name: "Task F6. Wait for MinIO Cluster Readiness"
      ansible.builtin.uri:
        url: "https://{{ minio_ha_virtual_ip }}:9000/minio/health/ready"
        validate_certs: true
        ca_path: "/usr/local/share/ca-certificates/vault-root-ca.crt"
      register: minio_readiness
      until: minio_readiness.status == 200
      retries: 30
      delay: 5

    - name: "Task F7. Configure local alias 'myminio' for Root"
      ansible.builtin.command:
        cmd: >-
          mc alias set myminio
          https://{{ minio_ha_virtual_ip }}:9000
          {{ minio_root_user }}
          {{ minio_root_password }}
      register: mc_alias_result
      until: mc_alias_result.rc == 0
      retries: 10
      delay: 3
      changed_when: false

    - name: "Task F8. Verify MinIO Cluster Status (Deep Check)"
      ansible.builtin.command:
        cmd: mc admin info myminio
      register: mc_info
      until: mc_info.rc == 0
      retries: 10
      delay: 5
      changed_when: false
