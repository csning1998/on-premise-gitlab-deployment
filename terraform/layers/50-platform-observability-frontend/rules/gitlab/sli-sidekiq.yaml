---
groups:
  - name: sidekiq-execution-sli
    rules:
      - record: sli_component:apdex:ratio_5m
        expr: >-
          sum(rate(gitlab_sli_sidekiq_execution_apdex_success_total{job="sidekiq",
          feature_category!~"continuous_integration|continuous_delivery|pipeline_composition|ci_scaling"}[5m]))
          / sum(rate(gitlab_sli_sidekiq_execution_apdex_total{job="sidekiq",
          feature_category!~"continuous_integration|continuous_delivery|pipeline_composition|ci_scaling"}[5m]))
        labels:
          component: sidekiq
